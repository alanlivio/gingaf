name: Deploy Playground

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "playground/**"
      - ".github/workflows/deploy-playground.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create examples symlink
        working-directory: ./ginga
        run: ln -s ../examples examples

      - name: Build Flutter Web
        working-directory: ./ginga
        run: flutter build web --base-href /gingaf/playground/player/

      - name: Install playground dependencies
        working-directory: ./playground
        run: npm install

      - name: Copy Flutter build to Playground public/player
        run: |
          mkdir -p playground/public/player
          cp -r ginga/build/web/* playground/public/player/

      - name: Build playground
        working-directory: ./playground
        run: npx vite build --base=/gingaf/playground/

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Prepare site directory
        run: |
          mkdir -p site/playground
          cp -r playground/dist/* site/playground/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}playground/
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
