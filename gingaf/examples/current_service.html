<!DOCTYPE html>
<html>

<body>
    <h1>CCWS Current Service Request</h1>
    <div id="status"></div>
    <div id="history"></div>
    <pre id="result">No data fetched yet.</pre>
    <script>
        async function fetchService() {
            const startPort = 44642;
            const maxRetry = 20;
            const resultDiv = document.getElementById('result');
            const statusDiv = document.getElementById('status');
            const historyDiv = document.getElementById('history');

            let trials = [];

            for (let port = startPort; port < startPort + maxRetry; port++) {
                const trialMsg = `Trying port ${port}...`;
                statusDiv.textContent = trialMsg;
                trials.push(port);
                historyDiv.textContent = "Probed ports: " + trials.join(", ");

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 500);

                    const response = await fetch(`http://localhost:${port}/dtv/current-service`, { signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (response.ok) {
                        const data = await response.json();
                        resultDiv.textContent = JSON.stringify(data, null, 2);
                        statusDiv.textContent = `Success at port ${port}!`;
                        statusDiv.style.color = "green";
                        return;
                    }
                } catch (error) {
                    console.log(`Port ${port} failed.`);
                }
            }

            resultDiv.textContent = "Error: Service not found in the probed range.";
            statusDiv.textContent = "Failed to resolve DTV service.";
            statusDiv.style.color = "red";
        }
        fetchService();
    </script>
</body>

</html>
